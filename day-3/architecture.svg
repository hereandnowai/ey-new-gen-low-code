<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    
    <!-- Frontend Node Gradient -->
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Backend Node Gradient -->
    <linearGradient id="backGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Azure Node Gradient -->
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4" />
      <stop offset="100%" stop-color="#005a9e" />
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
    
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="url(#bgGrad)" rx="16" />

  <!-- Grid / Decorative accents -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="350" />
    <line x1="300" y1="0" x2="300" y2="350" />
    <line x1="500" y1="0" x2="500" y2="350" />
    <line x1="700" y1="0" x2="700" y2="350" />
    <line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="220" x2="900" y2="220" />
  </g>

  <!-- ==================== FRONTEND NODE ==================== -->
  <g transform="translate(60, 90)" filter="url(#shadow)">
    <rect width="210" height="150" rx="14" fill="url(#frontGrad)" stroke="#38bdf8" stroke-width="2" />
    <text x="105" y="35" fill="#38bdf8" font-family="system-ui, sans-serif" font-weight="800" font-size="16" text-anchor="middle">React Frontend</text>
    <text x="105" y="55" fill="#64748b" font-family="system-ui, sans-serif" font-weight="600" font-size="11" text-anchor="middle">Vite + TypeScript</text>
    
    <rect x="20" y="80" width="170" height="45" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="105" y="106" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">App.tsx &amp; App.css</text>
  </g>

  <!-- ==================== BACKEND NODE ==================== -->
  <g transform="translate(360, 90)" filter="url(#shadow)">
    <rect width="210" height="150" rx="14" fill="url(#backGrad)" stroke="#818cf8" stroke-width="2" />
    <text x="105" y="35" fill="#818cf8" font-family="system-ui, sans-serif" font-weight="800" font-size="16" text-anchor="middle">Express Backend</text>
    <text x="105" y="55" fill="#64748b" font-family="system-ui, sans-serif" font-weight="600" font-size="11" text-anchor="middle">Node.js API Server</text>
    
    <rect x="20" y="80" width="170" height="45" rx="6" fill="#1e293b" stroke="#334155" />
    <text x="105" y="106" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">server.js (Port 5001)</text>
  </g>

  <!-- ==================== AZURE NODE ==================== -->
  <g transform="translate(660, 90)" filter="url(#shadow)">
    <rect width="180" height="150" rx="14" fill="url(#azureGrad)" stroke="#0078d4" stroke-width="1" />
    <text x="90" y="45" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="800" font-size="16" text-anchor="middle">Azure OpenAI</text>
    <text x="90" y="65" fill="#93c5fd" font-family="system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Foundry Portal</text>
    
    <rect x="20" y="90" width="140" height="35" rx="6" fill="#005a9e" stroke-opacity="0" />
    <text x="90" y="112" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">gpt-5.4 Model</text>
  </g>

  <!-- ==================== ARROWS & LABELS ==================== -->
  
  <!-- Arrow 1: Frontend -> Backend -->
  <path d="M 275 140 L 350 140" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="312.5" y="130" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">1. POST</text>
  
  <!-- Arrow 2: Backend -> Azure OpenAI -->
  <path d="M 575 140 L 650 140" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="612.5" y="130" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">2. FETCH</text>

  <!-- Arrow 3: Azure OpenAI -> Backend -->
  <path d="M 650 190 L 585 190" fill="none" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="617.5" y="210" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">3. REPLY</text>

  <!-- Arrow 4: Backend -> Frontend -->
  <path d="M 350 190 L 285 190" fill="none" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="317.5" y="210" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">4. JSON</text>

  <!-- Legend / Flow indicators -->
  <text x="450" y="300" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">
    Full Request &amp; Response Loop (Data flows Left to Right, then returns Right to Left)
  </text>
</svg>
